services:
  prometheus:
    image: prom/prometheus:latest
    container_name: fortuna_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./secrets/grafana_api_token.txt:/etc/prometheus/secrets/grafana_api_token:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fortuna_network

  grafana:
    image: grafana/grafana:latest
    container_name: fortuna_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fortuna_network

  fortuna-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fortuna_bot
    ports:
      - "8000:8000"
    environment:
      - BET_WORKERS=${BET_WORKERS:-5}
      - NUM_BETS=${NUM_BETS:-20}
      - DURATION=${DURATION:-5}
      - BASE_URL=${BASE_URL:-qa.gaming-ent.com}
      - REGISTRATION_WORKERS=${REGISTRATION_WORKERS:-10}
      - LOGIN_EXPLORING_WORKERS=${LOGIN_EXPLORING_WORKERS:-20}
      - LOGIN_LOGOUT_WORKERS=${LOGIN_LOGOUT_WORKERS:-30}
    depends_on:
      - prometheus
      - grafana
    networks:
      - fortuna_network
    restart: on-failure

networks:
  fortuna_network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
